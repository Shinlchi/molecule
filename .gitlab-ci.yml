---
stages:
  - build
  - test

variables:
  RUNNER_IMAGE: $CI_REGISTRY_IMAGE/molecule-runner
  DOCKER_HOST: unix:///var/run/docker.sock

# Build l'image runner et la pousse dans le registry GitLab.
# Ne tourne que si Dockerfile.runner ou requirements.txt change.
build:runner-image:
  stage: build
  image: docker:27
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$RUNNER_IMAGE:$CI_COMMIT_SHORT_SHA" -f Dockerfile.runner .
    - docker tag "$RUNNER_IMAGE:$CI_COMMIT_SHORT_SHA" "$RUNNER_IMAGE:latest"
    - docker push "$RUNNER_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$RUNNER_IMAGE:latest"
  rules:
    - changes:
        - Dockerfile.runner
        - requirements.txt

molecule:test:
  stage: test
  image: $RUNNER_IMAGE:latest
  before_script:
    - ansible-galaxy collection build --output-path /tmp/ --force
    - ansible-galaxy collection install /tmp/poc-minio-*.tar.gz --force
  script:
    - cd roles/configure && molecule test
  after_script:
    # Nettoyage garanti même si le job est annulé ou échoue
    - cd roles/configure && molecule destroy || true
  rules:
    - when: always
