---
- name: Validate server configuration
  ansible.builtin.assert:
    that:
      - server is mapping
      - server.url is defined and server.url | length > 0
      - server.access_key is defined and server.access_key | length > 0
      - server.secret_key is defined
    fail_msg: "server doit être un dict avec url, access_key et secret_key"
    quiet: true

- name: Process users
  ansible.builtin.include_tasks: user/create.yml
  loop: "{{ entries.users | default([]) }}"
  loop_control:
    loop_var: entry
    label: "{{ entry.name }}"

- name: Process buckets
  ansible.builtin.include_tasks: bucket/create.yml
  loop: "{{ entries.buckets | default([]) }}"
  loop_control:
    loop_var: entry
    label: "{{ entry.name }}"
