---
- name: Prepare kess
  hosts: kess
  gather_facts: false
  tasks:
    - name: Install minio Python package
      ansible.builtin.raw: pip install "minio>=7.1.4"
      changed_when: true

    - name: Install mc CLI
      ansible.builtin.shell: |
        curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
        chmod +x /usr/local/bin/mc
      args:
        creates: /usr/local/bin/mc

    - name: Wait for MinIO to be ready
      ansible.builtin.uri:
        url: "http://minio:9000/minio/health/live"
        status_code: 200
      register: health
      until: health.status == 200
      retries: 30
      delay: 3
