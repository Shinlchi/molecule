---
driver:
  name: docker

platforms:
  - name: minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    pre_build_image: true
    networks:
      - name: "molecule-poc-minio-{{ lookup('env', 'CI_JOB_ID') | default('local') }}"

  - name: kess
    image: python:3.12-slim
    command: sleep infinity
    pre_build_image: true
    networks:
      - name: "molecule-poc-minio-{{ lookup('env', 'CI_JOB_ID') | default('local') }}"

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: /workspace/roles
  config_options:
    defaults:
      interpreter_python: auto_silent
      callbacks_enabled: "profile_tasks,timer"
  inventory:
    group_vars:
      all:
        minio_server:
          url: "http://minio:9000"
          access_key: "minioadmin"
          secret_key: "minioadmin123"
        minio_alias: "test"
        test_minio_entries:
          users:
            - name: ulamog
              secret_key: "ulamog_pass123"
              policy: readwrite
            - name: khozilek
              secret_key: "khozilek_pass123"
              policy: readonly
          buckets:
            - name: ulamog-ftps
              size: 1GiB
            - name: khozilek-contact-plan
              size: 512MiB
