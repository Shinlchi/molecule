---
# Scénario molecule par défaut pour demo.harbor_like.configure.
#
# Séquence exécutée par `molecule test` :
#   dependency -> syntax -> create -> prepare -> converge
#     -> idempotence -> verify -> cleanup -> destroy
#
# Soit exactement RUN (converge) / RUN IDEMPOT (idempotence) / AUDIT (verify).

dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml

driver:
  # Par défaut on utilise docker. Pour forcer le driver delegated
  # (exécution sur localhost, sans container), exporter :
  #   export MOLECULE_DRIVER_NAME=delegated
  name: docker

platforms:
  - name: harbor-like-instance
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /tmp
    # Pour le driver delegated ces champs sont ignorés ; on garde
    # la même clef `name` pour que converge/verify ciblent le même host.

provisioner:
  name: ansible
  log: true
  config_options:
    defaults:
      interpreter_python: auto_silent
      callbacks_enabled: "profile_tasks,timer"
      stdout_callback: default
      result_format: yaml
    ssh_connection:
      pipelining: true
  inventory:
    host_vars:
      harbor-like-instance:
        ansible_user: root
    group_vars:
      all:
        # Variables utilisées par converge.yml pour appeler le rôle.
        server:
          url: "https://harbor.test.local"
          username: "admin"
          password: "molecule-test-password"
          validate_certs: false
        harbor_entries:
          - project:
              - name: demo
                visibility: public
          - project:
              - name: internal
                visibility: private
                storage_limit_gb: 20
          - project:
              - name: shared
                visibility: public
                auto_scan: true

verifier:
  name: ansible

scenario:
  name: default
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
