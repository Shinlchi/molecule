---
- name: Audit MinIO
  hosts: runner
  gather_facts: false
  vars:
    _auth:
      url: "{{ minio_server.url }}"
      access_key: "{{ minio_server.access_key }}"
      secret_key: "{{ minio_server.secret_key }}"
  tasks:
    - name: Collect MinIO state
      poc.minio.minio_info:
        auth: "{{ _auth }}"
      register: minio_state

    - name: Buckets
      ansible.builtin.debug:
        msg: >-
          {{ item.name }}
          — quota: {{ item.quota_bytes | human_readable if item.quota_bytes > 0 else 'aucun' }}
      loop: "{{ minio_state.buckets }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Users
      ansible.builtin.debug:
        msg: >-
          {{ item.access_key }}
          — policy: {{ item.policy | default('aucune') }}
          — status: {{ item.status }}
      loop: "{{ minio_state.users }}"
      loop_control:
        label: "{{ item.access_key }}"
