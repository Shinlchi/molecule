---
argument_specs:
  main:
    short_description: Applique une configuration Harbor-like.
    description:
      - Boucle sur C(entries) et applique chaque item via
        C(tasks/create_entry.yml).
    options:
      server:
        type: dict
        required: true
        description: Serveur Harbor-like cible.
        options:
          url:
            type: str
            required: true
            description: URL de base du Harbor-like (https).
          username:
            type: str
            required: true
            description: Nom d'utilisateur admin.
          password:
            type: str
            required: true
            no_log: true
            description: Mot de passe admin.
          validate_certs:
            type: bool
            default: true
            description: Valider les certificats TLS.
      entries:
        type: list
        elements: dict
        required: true
        description:
          - Liste d'entrées à appliquer. Chaque item est un dict avec une
            seule clé (C(project), C(registry), ...) dont la valeur est une
            liste d'objets.
