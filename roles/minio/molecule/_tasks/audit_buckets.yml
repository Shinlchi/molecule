---
- name: List buckets
  ansible.builtin.command:
    cmd: mc ls --json {{ minio_alias }}/
  register: audit_buckets_raw
  changed_when: false
  no_log: true

- name: Assert buckets present
  vars:
    got: >-
      {{ audit_buckets_raw.stdout_lines | map('from_json') | map(attribute='key')
      | map('regex_replace', '/$', '') | sort | list }}
    expected: "{{ test_minio_entries.buckets | map(attribute='name') | sort | list }}"
  ansible.builtin.assert:
    that:
      - got == expected
    success_msg: "Buckets present OK | expected: [{{ expected | join(', ') }}] | got: [{{ got | join(', ') }}]"
    fail_msg: "Buckets present KO | expected: [{{ expected | join(', ') }}] | got: [{{ got | join(', ') }}]"
  when: minio_expected == 'present'

- name: Assert buckets absent
  vars:
    got: >-
      {{ audit_buckets_raw.stdout_lines | map('from_json') | map(attribute='key')
      | map('regex_replace', '/$', '') | list }}
    expected: "{{ test_minio_entries.buckets | map(attribute='name') | sort | list }}"
    still_present: "{{ got | select('in', expected) | sort | list }}"
  ansible.builtin.assert:
    that:
      - still_present | length == 0
    success_msg: "Buckets absent OK | delete_entries: [{{ expected | join(', ') }}] | still present: [{{ still_present | join(', ') }}]"
    fail_msg: "Buckets absent KO | delete_entries: [{{ expected | join(', ') }}] | still present: [{{ still_present | join(', ') }}]"
  when: minio_expected == 'absent'

- name: Get bucket quota
  ansible.builtin.command:
    cmd: mc quota info --json {{ minio_alias }}/{{ item.name }}
  register: audit_quota_results
  changed_when: false
  no_log: true
  loop: "{{ test_minio_entries.buckets | selectattr('quota', 'defined') | list }}"
  loop_control:
    label: "{{ item.name }}"
  when: minio_expected == 'present'

- name: Build quota actual map
  ansible.builtin.set_fact:
    audit_quota_actual: >-
      {{ audit_quota_actual 
        | default({}) 
        | combine({
          item.item.name: (item.stdout | from_json).quota 
          | int
        })
      }}
  loop: "{{ audit_quota_results.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  no_log: true
  when: minio_expected == 'present'

# Converts human-readable quota strings (e.g. "1GiB", "512MiB") to bytes so they
# can be compared against the raw byte value returned by `mc quota info`.
# _num extracts the numeric part, _unit extracts the suffix, then multiplies by the lookup table.
- name: Build quota expected map
  ansible.builtin.set_fact:
    audit_quota_expected: >-
      {{ audit_quota_expected
        | default({})
        | combine({
          item.name: (_num | float * size_units[_unit]) | int
        })
      }}
  vars:
    size_units:
      TiB: 1099511627776
      GiB: 1073741824
      MiB: 1048576
      KiB: 1024
      GB: 1000000000
      MB: 1000000
      KB: 1000
      B: 1
    _num: "{{ item.quota | regex_replace('[A-Za-z]+$', '') }}"
    _unit: "{{ item.quota | regex_replace('^[0-9.]+', '') }}"
  loop: "{{ test_minio_entries.buckets | selectattr('quota', 'defined') | list }}"
  loop_control:
    label: "{{ item.name }}"
  when: minio_expected == 'present'

- name: Assert bucket quotas
  ansible.builtin.assert:
    that:
      - audit_quota_actual == audit_quota_expected
    success_msg: "Bucket quotas present OK | expected: {{ audit_quota_expected }} | got: {{ audit_quota_actual }}"
    fail_msg: "Bucket quotas present KO | expected: {{ audit_quota_expected }} | got: {{ audit_quota_actual }}"
  when: minio_expected == 'present'
