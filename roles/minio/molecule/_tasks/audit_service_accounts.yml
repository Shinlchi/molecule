---
- name: Get service account info
  ansible.builtin.command:
    cmd: mc admin user svcacct info --json {{ minio_alias }} {{ item.name }}
  register: audit_svcacct_results
  changed_when: false
  failed_when: false
  no_log: true
  loop: "{{ test_minio_entries.service_accounts | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: minio_expected == 'present'

- name: Build service account parent map
  ansible.builtin.set_fact:
    audit_svcacct_parent_actual: >-
      {{ audit_svcacct_parent_actual | default({}) | combine({
        item.item.name: (item.stdout | from_json).parentUser
      }) }}
  loop: "{{ audit_svcacct_results.results | selectattr('rc', 'eq', 0) | list }}"
  loop_control:
    label: "{{ item.item.name }}"
  no_log: true
  when: minio_expected == 'present'

- name: Assert service accounts present
  vars:
    expected_names: "{{ test_minio_entries.service_accounts | map(attribute='name') | sort | list }}"
    got_names: "{{ (audit_svcacct_parent_actual | default({})).keys() | sort | list }}"
    expected_parents: "{{ test_minio_entries.service_accounts | items2dict(key_name='name', value_name='user') }}"
  ansible.builtin.assert:
    that:
      - got_names == expected_names
      - (audit_svcacct_parent_actual | default({})) == expected_parents
    success_msg: "Service accounts present OK | expected: [{{ expected_names | join(', ') }}] | got: [{{ got_names | join(', ') }}]"
    fail_msg: >-
      Service accounts present KO
      | expected: [{{ expected_names | join(', ') }}]
      | got: [{{ got_names | join(', ') }}]
      | parents expected: {{ expected_parents }}
      | got: {{ audit_svcacct_parent_actual | default({}) }}
  when: minio_expected == 'present'

- name: Check service accounts absent
  ansible.builtin.command:
    cmd: mc admin user svcacct info --json {{ minio_alias }} {{ item.name }}
  register: audit_svcacct_absent_results
  changed_when: false
  failed_when: false
  no_log: true
  loop: "{{ test_minio_entries.service_accounts | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: minio_expected == 'absent'

- name: Assert service accounts absent
  vars:
    expected: "{{ test_minio_entries.service_accounts | map(attribute='name') | sort | list }}"
    still_present: "{{ audit_svcacct_absent_results.results | selectattr('rc', 'eq', 0) | map(attribute='item') | map(attribute='name') | sort | list }}"
  ansible.builtin.assert:
    that:
      - still_present | length == 0
    success_msg: "Service accounts absent OK | delete_entries: [{{ expected | join(', ') }}] | still present: [{{ still_present | join(', ') }}]"
    fail_msg: "Service accounts absent KO | delete_entries: [{{ expected | join(', ') }}] | still present: [{{ still_present | join(', ') }}]"
  when: minio_expected == 'absent'
