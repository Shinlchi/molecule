---
- name: List policies
  ansible.builtin.command:
    cmd: mc admin policy list --json {{ minio_alias }}
  register: audit_policies_raw
  changed_when: false
  no_log: true

- name: Assert policies present
  vars:
    got: "{{ audit_policies_raw.stdout_lines | map('from_json') | map(attribute='policy') | list }}"
  ansible.builtin.assert:
    that:
      - item.name in got
    success_msg: "Policy {{ item.name }} present OK"
    fail_msg: "Policy {{ item.name }} present KO | got: {{ got }}"
  loop: "{{ test_minio_entries.policies | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: minio_expected == 'present'

- name: Assert policies absent
  vars:
    got: "{{ audit_policies_raw.stdout_lines | map('from_json') | map(attribute='policy') | list }}"
  ansible.builtin.assert:
    that:
      - item.name not in got
    success_msg: "Policy {{ item.name }} absent OK"
    fail_msg: "Policy {{ item.name }} absent KO | still present: {{ got }}"
  loop: "{{ test_minio_entries.policies | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: minio_expected == 'absent'
