---
- name: Get service account info
  ansible.builtin.command:
    cmd: mc admin user svcacct info --json {{ minio_alias }} {{ item.name }}
  register: audit_svcacct_results
  changed_when: false
  no_log: true
  loop: "{{ test_minio_entries.service_accounts | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: minio_expected == 'present'

- name: Assert service account
  vars:
    sa_info: "{{ item.stdout | from_json }}"
  ansible.builtin.assert:
    that:
      - sa_info.parentUser == item.item.user
      - (sa_info.impliedPolicy | default(false) | bool) == (item.item.statements is not defined)
    success_msg: "SA {{ item.item.name }} OK | parent={{ item.item.user }}"
    fail_msg: "SA {{ item.item.name }} KO | got: {{ sa_info | to_json }}"
  loop: "{{ audit_svcacct_results.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: minio_expected == 'present'

- name: Check service account absent
  ansible.builtin.command:
    cmd: mc admin user svcacct info --json {{ minio_alias }} {{ item.name }}
  register: audit_svcacct_absent_results
  changed_when: false
  failed_when: false
  loop: "{{ test_minio_entries.service_accounts | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: minio_expected == 'absent'

- name: Assert service accounts absent
  ansible.builtin.assert:
    that:
      - item.rc != 0
    success_msg: "SA {{ item.item.name }} absent OK"
    fail_msg: "SA {{ item.item.name }} absent KO | still exists"
  loop: "{{ audit_svcacct_absent_results.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: minio_expected == 'absent'
