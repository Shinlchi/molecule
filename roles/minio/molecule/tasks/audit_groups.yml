---
- name: List groups
  ansible.builtin.command:
    cmd: mc admin group list --json {{ minio_alias }}
  register: audit_groups_raw
  changed_when: false
  no_log: true

- name: Assert groups present
  vars:
    got: "{{ (audit_groups_raw.stdout | from_json).groups | default([]) }}"
  ansible.builtin.assert:
    that:
      - item.name in got
    success_msg: "Group {{ item.name }} present OK"
    fail_msg: "Group {{ item.name }} present KO | got: {{ got }}"
  loop: "{{ test_minio_entries.groups | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: minio_expected == 'present'

- name: Assert groups absent
  vars:
    got: "{{ (audit_groups_raw.stdout | from_json).groups | default([]) }}"
  ansible.builtin.assert:
    that:
      - item.name not in got
    success_msg: "Group {{ item.name }} absent OK"
    fail_msg: "Group {{ item.name }} absent KO | still present: {{ got }}"
  loop: "{{ test_minio_entries.groups | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: minio_expected == 'absent'
