---
- name: Prepare kess
  hosts: kess
  gather_facts: false
  tasks:
    - name: Install minio Python package
      ansible.builtin.raw: pip install "minio==7.2.20"
      changed_when: true

    - name: Install mc CLI
      ansible.builtin.get_url:
        url: https://dl.min.io/client/mc/release/linux-amd64/mc
        dest: /usr/local/bin/mc
        mode: "0755"

    - name: Wait for MinIO to be ready
      ansible.builtin.uri:
        url: "http://minio:9000/minio/health/live"
        status_code: 200
      register: health
      until: health.status == 200
      retries: 30
      delay: 3
