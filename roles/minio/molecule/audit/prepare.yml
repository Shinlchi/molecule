---
- name: Prepare kess
  hosts: kess
  gather_facts: false
  tasks:
    - name: Wait for MinIO to be ready
      ansible.builtin.include_tasks: ../_fixtures/wait_for_minio.yml

    - name: Configure mc alias
      ansible.builtin.command:
        cmd: >-
          mc alias set {{ minio_alias }}
          {{ minio_server.url }}
          {{ minio_server.access_key }}
          {{ minio_server.secret_key }}
      changed_when: false
      no_log: true

    - name: Create buckets
      ansible.builtin.command:
        cmd: mc mb {{ minio_alias }}/{{ item }}
      loop:
        - emrakul-vault
        - emrakul-archive
      changed_when: true

    - name: Set bucket quota
      ansible.builtin.command:
        cmd: mc quota set {{ minio_alias }}/emrakul-vault --size 1GiB
      changed_when: true

    - name: Create policies
      ansible.builtin.command:
        cmd: mc admin policy create {{ minio_alias }} {{ item.name }} /dev/stdin
        stdin: "{{ item.doc | to_json }}"
      vars:
        policies:
          - name: emrakul-readonly
            doc:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action: [s3:GetObject, s3:ListBucket]
                  Resource:
                    - arn:aws:s3:::emrakul-vault
                    - arn:aws:s3:::emrakul-vault/*
          - name: emrakul-writeonly
            doc:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action: [s3:PutObject]
                  Resource: [arn:aws:s3:::emrakul-vault/*]
      loop: "{{ policies }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: true

    - name: Create user
      ansible.builtin.command:
        cmd: mc admin user add {{ minio_alias }} emrakul-scion emrakul_pass123
      changed_when: true
      no_log: true

    - name: Attach policy to user
      ansible.builtin.command:
        cmd: mc admin policy attach {{ minio_alias }} readwrite --user emrakul-scion
      changed_when: true

    - name: Create groups
      ansible.builtin.command:
        cmd: mc admin group add {{ minio_alias }} {{ item.name }} {{ item.members | join(' ') }}
      loop:
        - name: emrakul-readers
          members: [emrakul-scion]
        - name: emrakul-writers
          members: [emrakul-scion]
      loop_control:
        label: "{{ item.name }}"
      changed_when: true

    - name: Attach policy to group
      ansible.builtin.command:
        cmd: mc admin policy attach {{ minio_alias }} emrakul-readonly --group emrakul-readers
      changed_when: true

    - name: Create service accounts
      ansible.builtin.command:
        cmd: >-
          mc admin user svcacct add {{ minio_alias }} emrakul-scion
          --access-key {{ item.name }}
          --secret-key {{ item.secret_key }}
      loop:
        - name: sa-emrakul-full
          secret_key: sa_emrakul_full_123
        - name: sa-emrakul-scoped
          secret_key: sa_emrakul_scoped_123
      loop_control:
        label: "{{ item.name }}"
      changed_when: true
      no_log: true
