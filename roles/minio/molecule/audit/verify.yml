---
- name: Verify
  hosts: kess
  gather_facts: false
  tasks:
    - name: Read audit result
      ansible.builtin.slurp:
        src: /tmp/minio_audit.json
      register: audit_raw

    - name: Assert audit results are not empty
      vars:
        audit: "{{ audit_raw.content | b64decode | from_json }}"
      ansible.builtin.assert:
        that:
          - audit.policies | length > 0
          - audit.buckets | length > 0
          - audit.users | length > 0
          - audit.groups | length > 0
          - audit.service_accounts | length > 0
        success_msg: >-
          Audit OK | policies={{ audit.policies | length }}
          buckets={{ audit.buckets | length }}
          users={{ audit.users | length }}
          groups={{ audit.groups | length }}
          sa={{ audit.service_accounts | length }}
        fail_msg: "Audit KO | {{ audit | to_json }}"
