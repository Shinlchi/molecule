---
- name: Validate lib_arguments
  ansible.builtin.assert:
    that:
      - lib_arguments is mapping
      - lib_arguments.server is mapping
      - lib_arguments.server.url is defined and lib_arguments.server.url | length > 0
      - lib_arguments.server.access_key is defined and lib_arguments.server.access_key | length > 0
      - lib_arguments.server.secret_key is defined
      - role in ['configure', 'unconfigure']
    fail_msg: "lib_arguments.server doit avoir url, access_key et secret_key. role doit être 'configure' ou 'unconfigure'"
    quiet: true

- name: Set processing context
  ansible.builtin.set_fact:
    _minio_state: "{{ 'present' if role == 'configure' else 'absent' }}"
    _minio_task_files: "{{ configure_order if role == 'configure' else unconfigure_order }}"
  vars:
    configure_order:
      - _policy.yml
      - _bucket.yml
      - _user.yml
      - _service_account.yml
      - _group.yml
    unconfigure_order:
      - _service_account.yml
      - _user.yml
      - _group.yml
      - _bucket.yml
      - _policy.yml

- name: Process resources
  ansible.builtin.include_tasks: "{{ item }}"
  loop: "{{ _minio_task_files }}"
