---
- name: Manage bucket
  poc.minio.minio_bucket:
    name: "{{ entry.name }}"
    quota: "{{ entry.quota | default(omit) }}"
    auth:
      url: "{{ lib_arguments.server.url }}"
      access_key: "{{ lib_arguments.server.access_key }}"
      secret_key: "{{ lib_arguments.server.secret_key }}"
    state: "{{ entry.state | default(_minio_state) }}"
  no_log: false
  loop: "{{ lib_arguments.entries.buckets | default([]) }}"
  loop_control:
    loop_var: entry
    label: "{{ entry.name }}"
