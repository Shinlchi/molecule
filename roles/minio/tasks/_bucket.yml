---
- name: Manage bucket - {{ entry.name }}
  poc.minio.minio_bucket:
    name: "{{ entry.name }}"
    quota: "{{ entry.quota | default(omit) }}"
    auth:
      url: "{{ lib_arguments.server.url }}"
      access_key: "{{ lib_arguments.server.access_key }}"
      secret_key: "{{ lib_arguments.server.secret_key }}"
    state: "{{ entry.state | default(minio_state | default('present')) }}"
